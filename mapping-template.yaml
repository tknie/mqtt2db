database:
  url: <database URL>
  username: <database user name>
mqtt:
  server: <mqtt server host:1883>
  username: <mqtt user name [optional]>
  password: <mqtt password [optional]>
topic:
  - name: <mqtt topic>
    storeTablename: home
    mapping:
      - source: Time
        destination: Time
        type: time.Time
      - source: eHZ/Power
        destination: PowerCurr
        onlyPositive: true
        type: int64
      - source: eHZ/E_in
        destination: Total
        type: float64
      - source: eHZ/E_out
        destination: PowerOut
        negativeReference: eHZ/Power
        type: float64
